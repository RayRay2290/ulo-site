<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ulõ · Image Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f5ef; --card: #fcfaf7; --text: #1c1a18; --soft: #6b6158;
      --gold: #d4a373; --gold-dark: #b8935a; --border: #e5dfd8;
      --green: #7c9a7e; --red: #c88b8b; --radius: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); padding:20px; }
    .container { max-width:900px; margin:0 auto; }
    
    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 0; border-bottom:1px solid var(--border); margin-bottom:20px;
    }
    .logo { font-family:'DM Serif Display',serif; font-style:italic; font-size:22px; }
    .badge {
      font-size:9px; text-transform:uppercase; letter-spacing:0.15em;
      color:var(--soft); background:var(--card); padding:3px 8px;
      border:1px solid var(--border); border-radius:20px; margin-left:8px;
    }
    .btn {
      padding:8px 14px; border:1px solid var(--border); background:var(--card);
      color:var(--text); font-family:'DM Sans',sans-serif; font-size:11px;
      text-transform:uppercase; letter-spacing:0.06em; cursor:pointer;
      border-radius:var(--radius); white-space:nowrap;
    }
    .btn:hover { border-color:var(--gold); }
    .btn-primary { background:var(--gold); color:#fff; border-color:var(--gold); }
    .btn-primary:hover { background:var(--gold-dark); }
    .btn-sm { padding:4px 10px; font-size:10px; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    
    .section-title {
      font-size:11px; text-transform:uppercase; letter-spacing:0.1em;
      color:var(--soft); margin:24px 0 12px; padding-bottom:6px;
      border-bottom:1px solid var(--border);
    }
    
    .image-grid { display:grid; gap:12px; }
    
    .image-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); padding:14px; box-shadow:var(--shadow);
      display:grid; grid-template-columns:120px 1fr auto; gap:14px; align-items:center;
    }
    
    .image-card img {
      width:120px; height:80px; object-fit:cover; border-radius:4px;
      background:var(--border);
    }
    
    .image-info h4 {
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; margin-bottom:2px;
    }
    .image-info .slot {
      font-size:10px; color:var(--soft); text-transform:uppercase; letter-spacing:0.06em;
    }
    .image-info .current-url {
      font-size:9px; color:var(--soft); opacity:0.6; word-break:break-all; margin-top:4px;
      max-width:400px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    
    .image-actions {
      display:flex; flex-direction:column; gap:6px; align-items:flex-end;
    }
    .image-actions input {
      padding:5px 8px; border:1px solid var(--border); border-radius:var(--radius);
      font-family:'Inter',sans-serif; font-size:11px; width:250px;
      background:var(--bg); color:var(--text);
    }
    .image-actions input:focus { outline:none; border-color:var(--gold); }
    
    .toast {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:var(--text); color:#fff; padding:10px 18px; border-radius:20px;
      font-size:11px; opacity:0; transition:opacity 0.3s; z-index:1000; pointer-events:none;
    }
    .toast.show { opacity:1; }
    .toast.ok { background:var(--green); }
    .toast.err { background:var(--red); }
    
    @media (max-width:700px) {
      .image-card { grid-template-columns:1fr; }
      .image-actions input { width:100%; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <span class="logo">Ulõ</span>
      <span class="badge">Image Manager</span>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-sm" onclick="copyJSON()">📋 Copy JSON</button>
      <button class="btn btn-sm btn-primary" id="deployBtn" onclick="deploy()">📤 Update Site</button>
    </div>
  </div>

  <div class="section-title">Slide Backgrounds</div>
  <div class="image-grid" id="slideGrid"></div>

  <div class="section-title">Lightbox Galleries</div>
  <div class="image-grid" id="lightboxGrid"></div>

  <div class="section-title">Gallery Masonry</div>
  <div class="image-grid" id="galleryGrid"></div>

  <div style="margin-top:20px; padding-top:16px; border-top:1px solid var(--border);">
    <button class="btn" onclick="addGalleryImage()">+ Add Gallery Image</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// ULO IMAGE MANAGER — Netlify Auto-Deploy
// ============================================================

var NETLIFY_HOOK = 'https://api.netlify.com/build_hooks/YOUR_HOOK_ID_HERE';
var ADMIN_PASSWORD = 'ulo2026';
var STORE_KEY = 'ulo_image_manager';

// Default images
var DEFAULT_IMAGES = {
  slides: {
    about:   { label:'About Slide',       slot:'Background', url:'https://www.dsinterna.com/css/ulo-accents.jpg' },
    comfort: { label:'Comfort Zone',      slot:'Background', url:'https://www.dsinterna.com/css/King-bed.jpg' },
    super:   { label:'Super Comfort',     slot:'Background', url:'https://www.dsinterna.com/css/Super-comfort-zone.jpg' },
    studio:  { label:'Studio Sanctuary',  slot:'Background', url:'https://www.dsinterna.com/css/ulo-accents_2.jpg' },
    oneroom: { label:'One Bedroom',       slot:'Background', url:'https://www.dsinterna.com/css/1bed-balcony.jpg' },
    poolview:{ label:'Pool View',         slot:'Background', url:'https://www.dsinterna.com/css/1bed-poolview.jpg' },
    twobed:  { label:'Two Bedroom',       slot:'Background', url:'https://www.dsinterna.com/css/2bed.jpg' },
    portrait:{ label:'About Portrait',    slot:'Portrait',   url:'https://www.dsinterna.com/css/ulo-people.jpg' }
  },
  lightbox: {
    comfort: [
      { label:'Comfort Zone', slot:'Lightbox', url:'https://www.dsinterna.com/css/King-bed.jpg' },
      { label:'Comfort Zone', slot:'Lightbox', url:'https://www.dsinterna.com/css/King-bed2.jpg' },
      { label:'Comfort Zone', slot:'Lightbox', url:'https://www.dsinterna.com/css/Bathroom.JPG' }
    ],
    super: [
      { label:'Super Comfort', slot:'Lightbox', url:'https://www.dsinterna.com/css/Super-comfort-zone.jpg' },
      { label:'Super Comfort', slot:'Lightbox', url:'https://www.dsinterna.com/css/King-bed.jpg' },
      { label:'Super Comfort', slot:'Lightbox', url:'https://www.dsinterna.com/css/Bathroom2.JPG' }
    ],
    studio: [
      { label:'Studio Sanctuary', slot:'Lightbox', url:'https://www.dsinterna.com/css/ulo-accents_2.jpg' },
      { label:'Studio Sanctuary', slot:'Lightbox', url:'https://www.dsinterna.com/css/ulo-accents_3.jpg' }
    ],
    oneroom: [
      { label:'One Bedroom', slot:'Lightbox', url:'https://www.dsinterna.com/css/1bed-balcony.jpg' },
      { label:'One Bedroom', slot:'Lightbox', url:'https://www.dsinterna.com/css/1bed-hideout.jpg' },
      { label:'One Bedroom', slot:'Lightbox', url:'https://www.dsinterna.com/css/Bathroom.JPG' }
    ],
    poolview: [
      { label:'Pool View', slot:'Lightbox', url:'https://www.dsinterna.com/css/1bed-poolview.jpg' },
      { label:'Pool View', slot:'Lightbox', url:'https://www.dsinterna.com/css/Pool-view.JPG' },
      { label:'Pool View', slot:'Lightbox', url:'https://www.dsinterna.com/css/Pool.jpg' }
    ],
    twobed: [
      { label:'Two Bedroom', slot:'Lightbox', url:'https://www.dsinterna.com/css/2bed.jpg' },
      { label:'Two Bedroom', slot:'Lightbox', url:'https://www.dsinterna.com/css/King-bed.jpg' },
      { label:'Two Bedroom', slot:'Lightbox', url:'https://www.dsinterna.com/css/Bathroom2.JPG' }
    ]
  },
  gallery: [
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-accents.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-accents_2.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-accents_3.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-accents-nsibidi.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/Pool-view.JPG' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/Pool.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-people.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-people_2.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-people_3.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-people_4.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-people_5.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/ulo-people_7.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/Bathroom.JPG' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/Bathroom2.JPG' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/connect.jpg' },
    { label:'Gallery', slot:'Masonry', url:'https://www.dsinterna.com/css/1bed-hideout.jpg' }
  ],
  videoPoster: 'https://www.dsinterna.com/css/Pool.jpg'
};

var images = JSON.parse(localStorage.getItem(STORE_KEY) || 'null') || DEFAULT_IMAGES;

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(images)); }

function renderAll() {
  renderSection('slideGrid', images.slides, 'slides');
  renderLightboxSection();
  renderGallerySection();
}

function renderSection(gridId, data, type) {
  var grid = document.getElementById(gridId);
  var html = '';
  
  if (Array.isArray(data)) {
    data.forEach(function(img, i) {
      html += imageCard(img.label, img.slot, img.url, type, i);
    });
  } else {
    Object.keys(data).forEach(function(key) {
      var img = data[key];
      html += imageCard(img.label, img.slot, img.url, type, key);
    });
  }
  
  grid.innerHTML = html;
}

function renderLightboxSection() {
  var grid = document.getElementById('lightboxGrid');
  var html = '';
  
  Object.keys(images.lightbox).forEach(function(roomId) {
    var arr = images.lightbox[roomId];
    arr.forEach(function(img, i) {
      html += imageCard(img.label, img.slot, img.url, 'lightbox', roomId + '_' + i);
    });
  });
  
  grid.innerHTML = html;
}

function renderGallerySection() {
  var grid = document.getElementById('galleryGrid');
  var html = '';
  
  images.gallery.forEach(function(img, i) {
    html += imageCard(img.label, img.slot, img.url, 'gallery', i, true);
  });
  
  grid.innerHTML = html;
}

function imageCard(label, slot, url, type, key, showDelete) {
  return `
    <div class="image-card">
      <img src="${url}" alt="${label}" onerror="this.style.background='var(--border)';this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 80%22><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%236b6158%22 font-size=%2210%22>No image</text></svg>';" />
      <div class="image-info">
        <h4>${label}</h4>
        <div class="slot">${slot}</div>
        <div class="current-url">${url}</div>
      </div>
      <div class="image-actions">
        <input type="text" id="url-${type}-${key}" value="${url}" placeholder="Paste new image URL" />
        <div style="display:flex;gap:4px;">
          <button class="btn btn-sm" onclick="updateImage('${type}', '${key}')">Update</button>
          ${showDelete ? '<button class="btn btn-sm" onclick="deleteImage(\''+key+'\')" style="color:var(--red);border-color:var(--red);">×</button>' : ''}
        </div>
      </div>
    </div>`;
}

function updateImage(type, key) {
  var input = document.getElementById('url-' + type + '-' + key);
  var newUrl = input.value.trim();
  if (!newUrl) return toast('Please enter a URL', 'err');
  
  if (type === 'slides') {
    images.slides[key].url = newUrl;
  } else if (type === 'lightbox') {
    var parts = key.split('_');
    var roomId = parts[0];
    var index = parseInt(parts[1]);
    images.lightbox[roomId][index].url = newUrl;
  } else if (type === 'gallery') {
    images.gallery[parseInt(key)].url = newUrl;
  }
  
  save(); renderAll();
  toast('✅ Image updated', 'ok');
}

function deleteImage(index) {
  if (!confirm('Remove this image from the gallery?')) return;
  images.gallery.splice(parseInt(index), 1);
  save(); renderAll();
  toast('Image removed', 'ok');
}

function addGalleryImage() {
  var url = prompt('Paste the new image URL:');
  if (!url) return;
  images.gallery.push({ label:'Gallery', slot:'Masonry', url:url });
  save(); renderAll();
  toast('✅ Image added', 'ok');
}

// ---- DEPLOY ----
function deploy() {
  var pw = prompt('Enter admin password to deploy:');
  if (pw !== ADMIN_PASSWORD) {
    toast('❌ Wrong password', 'err');
    return;
  }

  var btn = document.getElementById('deployBtn');
  var orig = btn.textContent;
  btn.textContent = 'Saving...';
  btn.disabled = true;
  
  fetch('/.netlify/functions/save-data', {
    method: 'POST',
    body: JSON.stringify({
      password: ADMIN_PASSWORD,
      type: 'images',
      data: images
    }),
    headers: { 'Content-Type': 'application/json' }
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (!res.success) throw new Error(res.error || 'Save failed');
    btn.textContent = 'Deploying...';
    return fetch(NETLIFY_HOOK, { method: 'POST' });
  })
  .then(function() {
    btn.textContent = orig;
    btn.disabled = false;
    toast('✅ Site updating! Live in ~30s', 'ok');
  })
  .catch(function(err) {
    btn.textContent = orig;
    btn.disabled = false;
    console.error('Deploy error:', err);
    toast('❌ Failed — ' + err.message, 'err');
  });
}

function copyJSON() {
  navigator.clipboard.writeText(JSON.stringify(images, null, 2)).then(function() {
    toast('📋 Copied', 'ok');
  });
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type||'') + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

// ---- INIT ----
renderAll();
</script>

</body>
</html>
